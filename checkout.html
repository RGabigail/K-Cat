<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - K-Cat</title>

  <link rel="stylesheet" href="style.css">

  <!-- jQuery & jQuery UI -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.14.0/jquery-ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.14.0/themes/base/jquery-ui.min.css">
</head>

<body class="checkout">

<!-- Navigation -->
<nav>
  <a href="index.html" class="ui-btn">Home</a>
  <a href="about.html" class="ui-btn">About Us</a>
  <a href="contact.html" class="ui-btn">Contact</a>
  <a href="shopping_cart.html" class="cart-icon ui-btn">🛒</a>
</nav>

<main class="container">
  <h1>Checkout</h1>

  <!-- Cart Items Summary -->
  <h3>Your Items</h3>

  <div class="cart-item">
    <img src="images/sandalsblack-front.jpeg" alt="Black Sandals">
    <p>Black Sandals x1 - $19.99</p>
  </div>

  <div class="cart-item">
    <img src="images/flatsblack-front.jpeg" alt="Ballet Flats">
    <p>Ballet Flats x2 - $59.98</p>
  </div>

  <div class="cart-item">
    <img src="images/heelsbeige-front.jpeg" alt="Classic High Heels">
    <p>Classic High Heels x1 - $49.99</p>
  </div>

  <h2>Total: $129.96</h2>

  <!-- Checkout Form -->
  <form class="checkout-form">
    <h3>Customer Information</h3>
    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Address">
    <input type="email" placeholder="Email">

    <h3>Payment Information</h3>
    <input type="text" placeholder="Card Number">

    <label for="expDate">Expiration Date:</label>
    <input type="text" id="expDate" name="expDate">

    <input type="text" placeholder="CVV">

    <h3>Other Payment Options</h3>
    <button type="button" class="ui-btn">PayPal</button>
    <button type="button" class="ui-btn">Bitcoin</button>

    <br><br>

    <button type="button" class="submit-order ui-btn"
            onclick="location.href='confirmation.html'">
      Submit Order
    </button>
  </form>
</main>

<!-- jQuery UI Initialization -->
<script>
  $(function () {

    // Datepicker widget
    $("#expDate").datepicker();

    // Button widget
    $(".ui-btn").button();

  });
</script>

</body>
</html>
