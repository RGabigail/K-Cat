<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart - K-Cat</title>
  <link rel="stylesheet" href="style.css">

  <!-- jQuery & jQuery UI -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.14.0/jquery-ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.14.0/themes/base/jquery-ui.min.css">
</head>

<body class="order-page">

<header>
  <img src="images/logo.png" alt="K-Cat Logo" class="logo">
  <nav>
    <a href="index.html" class="ui-btn">Home</a>
    <a href="about.html" class="ui-btn">About Us</a>
    <a href="contact.html" class="ui-btn">Contact</a>
    <a href="shopping_cart.html" class="cart-icon ui-btn">🛒</a>
  </nav>
</header>

<main class="container">
  <h1>Shopping Cart</h1>

  <!-- Cart Item 1 -->
  <div class="cart-item">
    <img src="images/sandalsblack-front.jpeg" alt="Black Sandals">
    <div>
      <h3>Black Sandals</h3>
      <p>Price: $19.99</p>
      <p>
        Quantity: 1
        <button class="ui-btn">Edit</button>
        <button class="ui-btn">Remove</button>
      </p>
      <p><strong>Subtotal: $19.99</strong></p>
    </div>
  </div>

  <!-- Cart Item 2 -->
  <div class="cart-item">
    <img src="images/flatsblack-front.jpeg" alt="Ballet Flats">
    <div>
      <h3>Ballet Flats</h3>
      <p>Price: $29.99</p>
      <p>
        Quantity: 2
        <button class="ui-btn">Edit</button>
        <button class="ui-btn">Remove</button>
      </p>
      <p><strong>Subtotal: $59.98</strong></p>
    </div>
  </div>

  <!-- Cart Item 3 -->
  <div class="cart-item">
    <img src="images/heelsbeige-front.jpeg" alt="Classic High Heels">
    <div>
      <h3>Classic High Heels</h3>
      <p>Price: $49.99</p>
      <p>
        Quantity: 1
        <button class="ui-btn">Edit</button>
        <button class="ui-btn">Remove</button>
      </p>
      <p><strong>Subtotal: $49.99</strong></p>
    </div>
  </div>

  <!-- Total -->
  <h2>Total: $129.96</h2>

  <!-- Checkout Button -->
  <button class="ui-btn submit-order" onclick="location.href='checkout.html'">
    Proceed to Checkout
  </button>

</main>

<!-- jQuery UI Initialization -->
<script>
  $(function () {
    $(".ui-btn").button();
  });
</script>

</body>
</html>
